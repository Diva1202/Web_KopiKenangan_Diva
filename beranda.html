<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Kenangan - Halaman Resmi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; color: #333; background-color: #fdf8f3; }

        /* --- NAVIGASI --- */
        nav { position: fixed; top: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; z-index: 1000; }
        .logo { color: #d4af37; font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .logo img { height: 40px; }
        .menu-nav { display: flex; list-style: none; }
        .menu-nav li { margin-left: 20px; }
        .menu-nav a { color: #fff; text-decoration: none; transition: 0.3s; }
        .menu-nav a:hover { color: #d4af37; }

        /* --- HERO SLIDER --- */
        .hero { height: 100vh; position: relative; overflow: hidden; background: #000; }
        .slider { width: 300%; height: 100%; display: flex; animation: slide 15s infinite; }
        .slide { width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(60%); }
        
        @keyframes slide {
            0% { transform: translateX(0); }
            30% { transform: translateX(0); }
            35% { transform: translateX(-33.33%); }
            65% { transform: translateX(-33.33%); }
            70% { transform: translateX(-66.66%); }
            100% { transform: translateX(-66.66%); }
        }

        .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; text-align: center; color: #fff; width: 90%; }
        .hero-content h1 { font-size: 50px; margin-bottom: 20px; }
        .hero-content h1 span { color: #d4af37; }
        .btn-utama { padding: 12px 30px; background: #d4af37; color: #1a1a1a; text-decoration: none; border-radius: 50px; font-weight: 600; display: inline-block; }

        /* --- SECTION --- */
        .section { padding: 100px 50px; }
        .menu-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .menu-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #fff; }
        .menu-img-wrapper img { width: 100%; height: 180px; object-fit: cover; }
        .menu-info { padding: 15px; }
        .map-wrapper { width: 100%; height: 300px; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        
        @media (max-width: 768px) { .menu-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><img src="image/1.png" alt="Logo"> Kopi Kenangan</div>
        <ul class="menu-nav">
            <li><a href="#tentang">Tentang</a></li>
            <li><a href="#menu-lengkap">Menu</a></li>
            <li><a href="#lokasi">Lokasi</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="slider">
            <div class="slide" style="background-image: url('image/iklan1.jpg');"></div>
            <div class="slide" style="background-image: url('image/iklan2.jpg');"></div>
            <div class="slide" style="background-image: url('image/iklan3.jpg');"></div>
        </div>
        <div class="hero-content">
            <h1>Kenangan manis dalam<br>setiap <span>tegukan.</span></h1>
            <a href="#menu-lengkap" class="btn-utama">Lihat Menu</a>
        </div>
    </section>

    <section id="tentang" class="section">
        <h2>Perjalanan Gula Aren</h2>
        <p>Kopi Kenangan hadir membawa cita rasa gula aren asli.</p>
    </section>

    <section id="menu-lengkap" class="section">
        <h2>Menu Lengkap</h2>
        <div class="menu-container">
            <div class="menu-card">
                <div class="menu-img-wrapper"><img src="image/1.jpg" alt="Kopi"></div>
                <div class="menu-info"><h3>Kopi Kenangan Mantan</h3><p>Espresso + Gula Aren.</p></div>
            </div>
        </div>
    </section>

    <section id="lokasi" class="section">
        <h2>Lokasi Kami</h2>
        <div class="map-wrapper">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3960.30745585006!2d109.66!3d-6.89!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNsKwNTMnMjQuMCJTIDEwOcKwMzknMzYuMCJF!5e0!3m2!1sid!2sid!4v1234567890" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

</body>
</html>

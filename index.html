<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Kopi Kenangan</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #4e342e, #6d4c41);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: #fff;
      width: 100%;
      max-width: 380px;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo-icon {
      font-size: 50px;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 700;
      color: #5d4037;
      margin-top: 5px;
    }

    .tagline {
      font-size: 13px;
      color: #777;
      margin-bottom: 10px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }

    .form-group input:focus {
      border-color: #6d4c41;
      box-shadow: 0 0 5px rgba(109, 76, 65, 0.3);
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #6d4c41;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background: #5d4037;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo-section">
      <div class="logo-icon">☕</div>
      <div class="brand-name">Kopi Kenangan</div>
      <div class="tagline">Karena setiap kopi punya cerita</div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="user">Username</label>
        <input type="text" id="user" placeholder="Masukkan username" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="email@contoh.com" required>
      </div>

      <div class="form-group">
        <label for="pass">Password</label>
        <input type="password" id="pass" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">Masuk</button>
    </form>

    <div class="footer">
      ©️ 2026 Kopi Kenangan
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(event){
      // Mencegah form untuk reload halaman secara default
      event.preventDefault();

      // Mengambil input dari user
      var username = document.getElementById("user").value;
      var password = document.getElementById("pass").value;

      // Logika validasi
      if(username === "admin" && password === "kenangan"){
        alert("Login berhasil! Selamat datang ☕");
        // Mengarahkan ke halaman beranda
        window.location.href = "beranda.html";
      } else {
        alert("Username atau password salah!");
      }
    });
  </script>

</body>
</html>
